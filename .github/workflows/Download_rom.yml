name: Download & Upload Xiaomi.eu ROM

on:
  workflow_dispatch:

permissions:
  contents: write   # 🔥 FIX 403 ở đây

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Download ROM
        run: |
          FILE="xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip"
          URL="https://netix.dl.sourceforge.net/project/xiaomi-eu-multilang-miui-roms/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip"

          aria2c -x 16 -s 16 -k 1M --continue=true -o "$FILE" "$URL"

      - name: Upload to Pixeldrain
  run: |
    FILE="xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip"

    RESPONSE=$(curl -s -T "$FILE" https://pixeldrain.com/api/file)

    echo "Response: $RESPONSE"

    ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | cut -d'"' -f4)

    echo "Pixeldrain link:"
    echo "https://pixeldrain.com/u/$ID"
