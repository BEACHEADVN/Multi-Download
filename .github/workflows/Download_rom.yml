name: Auto Socrates ROM (Pixeldrain API)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl grep sed

      # ===== GET ROM =====
      - name: Get ROM
        id: rom
        run: |
          BASE_URL="https://sourceforge.net/projects/xiaomi-eu-multilang-miui-roms/files/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/"
          HTML=$(curl -s "$BASE_URL")

          FILE=$(echo "$HTML" | grep -o 'xiaomi.eu_SOCRATES_OS3[^"]*zip' | sort -V | tail -n 1)
          URL="https://netix.dl.sourceforge.net/project/xiaomi-eu-multilang-miui-roms/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/$FILE"

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ===== CHECK PIXELDRAIN =====
      - name: Check Pixeldrain
        id: check
        run: |
          FILE="${{ steps.rom.outputs.file }}"

          if [ -f uploaded.txt ]; then
            ID=$(grep "$FILE" uploaded.txt | cut -d '|' -f2)

            if [ ! -z "$ID" ]; then
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pixeldrain.com/api/file/$ID)

              if [ "$STATUS" = "200" ]; then
                echo "skip=true" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
          fi

          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Stop if exists
        if: steps.check.outputs.skip == 'true'
        run: exit 0

      # ===== DOWNLOAD =====
      - name: Download
        run: |
          aria2c -x 16 -s 16 -k 1M --continue=true \
            -o "${{ steps.rom.outputs.file }}" \
            "${{ steps.rom.outputs.url }}"

      # ===== UPLOAD =====
      - name: Upload Pixeldrain
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"

          RESPONSE=$(curl -s -u ":$PD_API_KEY" -F "file=@${FILE}" https://pixeldrain.com/api/file)
          ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | cut -d '"' -f4)

          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "link=https://pixeldrain.com/u/${ID}" >> $GITHUB_OUTPUT

      # ===== SAVE STATE =====
      - name: Save state
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          ID="${{ steps.pd.outputs.id }}"

          echo "$FILE|$ID" >> uploaded.txt

      # ===== COMMIT =====
      - name: Commit
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add uploaded.txt
          git commit -m "update list" || exit 0
          git push

      # ===== TELEGRAM =====
      - name: Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          LINK="${{ steps.pd.outputs.link }}"
          FILE="${{ steps.rom.outputs.file }}"

          TEXT="<b>Socrates ROM</b>
          $FILE
          <a href=\"$LINK\">Download</a>"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$TEXT" \
            -d parse_mode="HTML"
