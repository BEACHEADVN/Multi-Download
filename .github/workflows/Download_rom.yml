name: Download Xiaomi.eu ROM (Fast & Stable)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y aria2 wget

      - name: Download with aria2 (multi-thread)
        run: |
          URL="https://downloads.sourceforge.net/project/xiaomi-eu-multilang-miui-roms/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip"
          OUTPUT="xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip"

          aria2c \
            -x 16 \
            -s 16 \
            -k 1M \
            --retry-wait=5 \
            --max-tries=10 \
            --timeout=60 \
            --continue=true \
            --summary-interval=5 \
            --header="User-Agent: Mozilla/5.0" \
            --header="Referer: https://sourceforge.net/" \
            -o "$OUTPUT" \
            "$URL" || echo "aria2 failed, fallback to wget"

      - name: Fallback wget if aria2 failed
        run: |
          FILE="xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip"
          if [ ! -f "$FILE" ]; then
            wget --content-disposition -O "$FILE" "https://sourceforge.net/projects/xiaomi-eu-multilang-miui-roms/files/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip/download"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi-eu-rom
          path: xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip
