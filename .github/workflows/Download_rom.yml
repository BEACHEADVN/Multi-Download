name: Auto Socrates ROM (Pixeldrain API)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # Chạy mỗi tiếng một lần

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== PULL LATEST STATE =====
      - name: Pull latest
        run: git pull origin main || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl

      # ===== GET ROM INFO (SAFE MODE) =====
      - name: Get Latest ROM
        id: rom
        run: |
          # Lấy danh sách file từ SourceForge
          BASE_URL="https://sourceforge.net/projects/xiaomi-eu-multilang-miui-roms/files/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/"
          HTML=$(curl -sL "$BASE_URL")
          
          # Tìm file SOCRATES mới nhất
          FILE=$(echo "$HTML" | grep -o 'xiaomi.eu_SOCRATES_OS3[^"]*zip' | sort -V | tail -n 1)
          
          # Link tải trực tiếp (sử dụng mirror netix hoặc tự động)
          URL="https://downloads.sourceforge.net/project/xiaomi-eu-multilang-miui-roms/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/$FILE"

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ===== CHECK IF ALREADY UPLOADED =====
      - name: Check Pixeldrain State
        id: check
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          STATE_FILE="rom_uploaded.txt"
          touch $STATE_FILE # Tạo file nếu chưa tồn tại
          
          echo "Checking for: $FILE"
          
          if grep -Fq "$FILE|" "$STATE_FILE"; then
            ID=$(grep -F "$FILE|" "$STATE_FILE" | head -n 1 | cut -d '|' -f2)
            
            # Kiểm tra xem file trên Pixeldrain còn sống không
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL")
            if [ "$STATUS" == "404" ]; then
               echo "File thực sự đã bị xóa."
               # Tiến hành upload lại
            elif [ "$STATUS" == "200" ]; then
               echo "File vẫn ngon."
            else
               echo "Lỗi server ($STATUS), chờ 5s rồi thử lại..."
            fi
            
            if [ "$STATUS" = "200" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "File đã tồn tại trên Pixeldrain và vẫn còn sống. Skip!"
            else
              echo "skip=false" >> $GITHUB_OUTPUT
              echo "File có trong log nhưng link Pixeldrain đã chết. Tiến hành tải lại."
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "File mới hoàn toàn. Tiến hành tải."
          fi

      # ===== DOWNLOAD (ONLY IF NEW) =====
      - name: Download ROM
        if: steps.check.outputs.skip != 'true'
        run: |
          aria2c -x 16 -s 16 -k 1M --continue=true \
            -o "${{ steps.rom.outputs.file }}" \
            "${{ steps.rom.outputs.url }}"

      # ===== UPLOAD PIXELDRAIN (ONLY IF NEW) =====
      - name: Upload to Pixeldrain
        if: steps.check.outputs.skip != 'true'
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          # Upload lên Pixeldrain kèm API Key
          RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@${FILE}" https://pixeldrain.com/api/file)
          
          # Lấy ID từ JSON trả về
          ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | cut -d '"' -f4)

          if [ -z "$ID" ]; then
            echo "Upload lên Pixeldrain thất bại!"
            echo "Response: $RESPONSE"
            exit 1
          fi

          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "link=https://pixeldrain.com/u/${ID}" >> $GITHUB_OUTPUT

      # ===== TELEGRAM NOTIFICATION =====
      - name: Send Telegram Notification
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILE="${{ steps.rom.outputs.file }}"
          LINK="${{ steps.pd.outputs.link }}"
          
          TEXT="<b>🚀 New Socrates ROM Uploaded!</b>%0A%0A📦 File: <code>$FILE</code>%0A🔗 Link: <a href=\"$LINK\">Click here to download</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$TEXT" \
            -d parse_mode="HTML"

      # ===== SAVE STATE & SAFE PUSH =====
      - name: Save State and Push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          FILE="${{ steps.rom.outputs.file }}"
          ID="${{ steps.pd.outputs.id }}"
          STATE_FILE="rom_uploaded.txt"
          
          # Ghi log: Tên_file|ID_Pixeldrain
          echo "$FILE|$ID" >> "$STATE_FILE"
          
          git add "$STATE_FILE"
          git commit -m "Add ROM: $FILE" || exit 0
          
          # Dùng Safe Push để tránh lỗi bị reject
          git pull --rebase origin main
          git push origin main
