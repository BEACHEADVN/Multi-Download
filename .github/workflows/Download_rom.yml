name: Download Xiaomi.eu ROM (Stable Mirror)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Download ROM (direct mirror)
        run: |
          FILE="xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip"

          # Mirror thật (ổn định)
          URL="https://netix.dl.sourceforge.net/project/xiaomi-eu-multilang-miui-roms/xiaomi.eu/HyperOS-STABLE-RELEASES/HyperOS3.0/xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip"

          aria2c \
            -x 16 \
            -s 16 \
            -k 1M \
            --continue=true \
            --max-tries=10 \
            --retry-wait=5 \
            -o "$FILE" \
            "$URL"

      - name: Verify file
        run: |
          FILE="xiaomi.eu_SOCRATES_OS3.0.5.0.VMKCNXM_15.zip"
          ls -lh "$FILE"
          file "$FILE"
