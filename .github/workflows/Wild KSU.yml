name: Wild_KSU

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest
        run: git pull origin main || true

      # ===== LẤY THÔNG TIN APK MỚI NHẤT =====
      - name: Get Latest Release
        id: wild_ksu
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
            import os, requests
            repo = "WildKernels/Wild_KSU"
            headers = {"Authorization": f"token {os.environ['GH_TOKEN']}"}
            try:
                response = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=headers)
                data = response.json()
                tag = data.get('tag_name', '')
                date = data.get('published_at', '')
                html_url = data.get('html_url', '')
                
                assets = data.get('assets', [])
                # Ưu tiên tìm file có đuôi .apk
                apk_asset = next((a for a in assets if a['name'].endswith(".apk")), None)
                
                if apk_asset:
                    file_name = apk_asset['name']
                    dl_url = apk_asset['browser_download_url']
                    size = apk_asset['size']
                else:
                    # Nếu không thấy APK, thông báo lỗi hoặc bỏ qua
                    print("No APK found in the latest release!"); exit(1)
                
                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"tag={tag}\nfile_name={file_name}\ndl_url={dl_url}\nsize={size}\ndate={date}\nhtml_url={html_url}\n")
            except Exception as e:
                print(f"Error: {e}"); exit(1)

      # ===== KIỂM TRA PHIÊN BẢN ĐÃ LƯU =====
      - name: Check State
        id: check
        run: |
          touch wild_ksu_manager_state.txt
          if [ "${{ steps.wild_ksu.outputs.tag }}" = "$(cat wild_ksu_manager_state.txt)" ]; then 
            echo "skip=true" >> $GITHUB_OUTPUT
          else 
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== TẢI APK TỪ GITHUB =====
      - name: Download APK
        if: steps.check.outputs.skip != 'true'
        run: |
          curl -L -o "${{ steps.wild_ksu.outputs.file_name }}" "${{ steps.wild_ksu.outputs.dl_url }}"

      # ===== GỬI APK QUA TELEGRAM =====
      - name: Upload APK to Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ steps.wild_ksu.outputs.tag }}
          URL: ${{ steps.wild_ksu.outputs.html_url }}
          SIZE: ${{ steps.wild_ksu.outputs.size }}
          DATE: ${{ steps.wild_ksu.outputs.date }}
          FILE_NAME: ${{ steps.wild_ksu.outputs.file_name }}
        shell: python
        run: |
          import os, requests, datetime
          
          def get_size(b):
              b = int(b)
              for unit in ['B','KB','MB']:
                  if b < 1024: return f"{b:.2f} {unit}"
                  b /= 1024
              return f"{b:.2f} MB"

          bot_token = os.environ['BOT_TOKEN']
          chat_id = os.environ['CHAT_ID']
          tag, url = os.environ['TAG'], os.environ['URL']
          size = get_size(os.environ['SIZE'])
          file_name = os.environ['FILE_NAME']
          
          try:
              date_obj = datetime.datetime.strptime(os.environ['DATE'], "%Y-%m-%dT%H:%M:%SZ") + datetime.timedelta(hours=7)
              date_str = date_obj.strftime("%d/%m/%Y %H:%M")
          except: date_str = "N/A"

          caption = (f"<b>📱 Wild_KSU Manager New Update!</b>\n\n"
                     f"📦 Version: <code>{tag}</code>\n"
                     f"📊 Size: <code>{size}</code>\n"
                     f"📅 Date: <code>{date_str}</code> (VN)\n\n"
                     f"💡 <i>Bạn có thể cài đặt trực tiếp file APK này.</i>\n\n"
                     f"<a href='{url}'>🔗 Changelog on GitHub</a>")
          
          with open(file_name, 'rb') as f:
              files = {'document': (file_name, f)}
              data = {'chat_id': chat_id, 'caption': caption, 'parse_mode': 'HTML'}
              r = requests.post(f"https://api.telegram.org/bot{bot_token}/sendDocument", data=data, files=files)
              if r.status_code != 200:
                  print(r.text); exit(1)

      # ===== LƯU LẠI PHIÊN BẢN ĐÃ GỬI =====
      - name: Save new state
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.wild_ksu.outputs.tag }}" > wild_ksu_manager_state.txt
          git add wild_ksu_manager_state.txt
          git commit -m "Update Wild_KSU Manager state to ${{ steps.wild_ksu.outputs.tag }}" || exit 0
          git pull --rebase origin main
          git push origin main
