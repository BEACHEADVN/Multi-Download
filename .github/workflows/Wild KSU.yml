name: Wild_KSU Manager Dual-Build Checker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest
        run: git pull origin main || true

      # ===== LẤY THÔNG TIN CẢ 2 BẢN APK =====
      - name: Get Latest Release
        id: wild_ksu
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
            import os, requests, json
            repo = "WildKernels/Wild_KSU"
            headers = {"Authorization": f"token {os.environ['GH_TOKEN']}"}
            try:
                response = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=headers)
                data = response.json()
                tag = data.get('tag_name', '')
                date = data.get('published_at', '')
                html_url = data.get('html_url', '')
                
                assets = data.get('assets', [])
                # Tìm tất cả các file .apk
                apk_assets = [a for a in assets if a['name'].endswith(".apk")]
                
                if not apk_assets:
                    print("No APK found!"); exit(1)
                
                # Tạo list thông tin asset để truyền sang step sau
                asset_info = []
                for a in apk_assets:
                    asset_info.append({
                        "name": a['name'],
                        "url": a['browser_download_url'],
                        "size": a['size']
                    })
                
                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"tag={tag}\ndate={date}\nhtml_url={html_url}\nassets_json={json.dumps(asset_info)}\n")
            except Exception as e:
                print(f"Error: {e}"); exit(1)

      # ===== KIỂM TRA PHIÊN BẢN =====
      - name: Check State
        id: check
        run: |
          touch wild_ksu_manager_state.txt
          if [ "${{ steps.wild_ksu.outputs.tag }}" = "$(cat wild_ksu_manager_state.txt)" ]; then 
            echo "skip=true" >> $GITHUB_OUTPUT
          else 
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== TẢI VÀ GỬI CẢ 2 FILE QUA TELEGRAM =====
      - name: Upload APKs to Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ steps.wild_ksu.outputs.tag }}
          URL: ${{ steps.wild_ksu.outputs.html_url }}
          DATE: ${{ steps.wild_ksu.outputs.date }}
          ASSETS_JSON: ${{ steps.wild_ksu.outputs.assets_json }}
        shell: python
        run: |
          import os, requests, datetime, json
          
          def get_size(b):
              b = int(b)
              for unit in ['B','KB','MB']:
                  if b < 1024: return f"{b:.2f} {unit}"
                  b /= 1024
              return f"{b:.2f} MB"

          bot_token = os.environ['BOT_TOKEN']
          chat_id = os.environ['CHAT_ID']
          tag, url = os.environ['TAG'], os.environ['URL']
          assets = json.loads(os.environ['ASSETS_JSON'])
          
          try:
              date_obj = datetime.datetime.strptime(os.environ['DATE'], "%Y-%m-%dT%H:%M:%SZ") + datetime.timedelta(hours=7)
              date_str = date_obj.strftime("%d/%m/%Y %H:%M")
          except: date_str = "N/A"

          # Soạn nội dung tin nhắn tổng hợp
          caption = (f"<b>📱 Wild_KSU Manager Update!</b>\n"
                     f"━━━━━━━━━━━━━━━━━━\n"
                     f"📦 Version: <code>{tag}</code>\n"
                     f"📅 Date: <code>{date_str}</code> (VN)\n\n")
          
          for a in assets:
              caption += f"🔹 <b>{a['name']}</b>\n      └ 📊 Size: <code>{get_size(a['size'])}</code>\n"
          
          caption += f"\n<a href='{url}'>🔗 View Changelog on GitHub</a>"

          # Gửi file đầu tiên kèm Caption
          # Gửi các file tiếp theo dưới dạng group (hoặc riêng lẻ để kèm text)
          for i, a in enumerate(assets):
              print(f"Downloading {a['name']}...")
              r_dl = requests.get(a['url'])
              with open(a['name'], 'wb') as f:
                  f.write(r_dl.content)
              
              with open(a['name'], 'rb') as f:
                  files = {'document': (a['name'], f)}
                  # Chỉ file đầu tiên mới gửi kèm Caption đầy đủ
                  payload = {'chat_id': chat_id, 'parse_mode': 'HTML'}
                  if i == 0:
                      payload['caption'] = caption
                  
                  requests.post(f"https://api.telegram.org/bot{bot_token}/sendDocument", data=payload, files=files)

      # ===== LƯU TRẠNG THÁI =====
      - name: Save new state
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.wild_ksu.outputs.tag }}" > wild_ksu_manager_state.txt
          git add wild_ksu_manager_state.txt
          git commit -m "Update Wild_KSU Manager to ${{ steps.wild_ksu.outputs.tag }}" || exit 0
          git pull --rebase origin main
          git push origin main
