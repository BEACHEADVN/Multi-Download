name: Kemono.cr Ultimate Downloader

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== BƯỚC 1: GIẢI QUYẾT DNS CHO KEMONO.CR =====
      - name: Force DNS for Kemono.cr
        run: |
          echo "🔍 Đang truy tìm IP của Kemono.cr qua Cloudflare DNS..."
          
          # Lấy IP của domain chính và các server dữ liệu
          K_IP=$(curl -sH "accept: application/dns-json" "https://cloudflare-dns.com/dns-query?name=kemono.cr&type=A" | jq -r '.Answer[0].data')
          N4_IP=$(curl -sH "accept: application/dns-json" "https://cloudflare-dns.com/dns-query?name=n4.kemono.cr&type=A" | jq -r '.Answer[0].data')
          N3_IP=$(curl -sH "accept: application/dns-json" "https://cloudflare-dns.com/dns-query?name=n3.kemono.cr&type=A" | jq -r '.Answer[0].data')

          # Ép IP vào file hosts để bypass lỗi "Name or service not known"
          if [ "$K_IP" != "null" ]; then
            echo "$K_IP kemono.cr" | sudo tee -a /etc/hosts
            echo "✅ Trỏ kemono.cr -> $K_IP"
          fi
          
          if [ "$N4_IP" != "null" ]; then
            echo "$N4_IP n4.kemono.cr" | sudo tee -a /etc/hosts
            echo "✅ Trỏ n4.kemono.cr -> $N4_IP"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          pip install requests

      # ===== BƯỚC 2: TẢI FILE TỪ KEMONO.CR API =====
      - name: Fetch and Download
        id: scraper
        shell: python
        run: |
            import os, requests, sys, urllib.parse, time

            # Cấu hình mục tiêu
            service = "patreon"
            user_id = "131186049"
            post_id = "117252586"
            api_url = f"https://kemono.cr/api/v1/{service}/user/{user_id}/post/{post_id}"
            
            headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                'Accept': 'application/json',
                'Referer': 'https://kemono.cr/'
            }

            try:
                print(f"📡 Đang gọi API: {api_url}")
                response = None
                for i in range(5):
                    try:
                        # verify=False để tránh lỗi chứng chỉ khi ép IP
                        response = requests.get(api_url, headers=headers, timeout=20, verify=False)
                        if response.status_code == 200: break
                    except: pass
                    time.sleep(5)
                
                if not response or response.status_code != 200:
                    print(f"❌ Không thể kết nối API Kemono.cr. Server có thể đang chặn GitHub.")
                    sys.exit(1)
                
                data = response.json()
                post_data = data[0] if isinstance(data, list) else data
                attachments = post_data.get('attachments', [])
                
                main_file = post_data.get('file')
                if main_file and main_file.get('path'):
                    attachments.append(main_file)

                if not attachments:
                    print("❌ Không thấy file đính kèm.")
                    sys.exit(1)

                downloaded_files = []
                # Các server chứa file của kemono.cr
                servers = ["https://n4.kemono.cr", "https://n3.kemono.cr", "https://kemono.cr"]
                
                for file_info in attachments:
                    path = file_info.get('path')
                    original_name = file_info.get('name') or path.split('/')[-1]
                    # Làm sạch tên file (xóa ký tự lạ)
                    clean_name = "".join([c for c in original_name if c.isalnum() or c in "._- "]).strip()
                    
                    success = False
                    for srv in servers:
                        dl_url = f"{srv}/data{path}?f={urllib.parse.quote(original_name)}"
                        print(f"⏳ Thử tải từ: {srv}")
                        try:
                            with requests.get(dl_url, headers=headers, stream=True, timeout=45, verify=False) as r:
                                if r.status_code == 200:
                                    with open(clean_name, 'wb') as f:
                                        for chunk in r.iter_content(chunk_size=8192):
                                            f.write(chunk)
                                    success = True
                                    print(f"✅ Đã tải: {clean_name}")
                                    break
                        except: continue
                    
                    if success: downloaded_files.append(clean_name)

                if not downloaded_files:
                    sys.exit(1)

                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"files={','.join(downloaded_files)}\n")

            except Exception as e:
                print(f"❌ Lỗi: {e}")
                sys.exit(1)

      # ===== BƯỚC 3: UPLOAD LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          IFS=',' read -ra FILES_ARRAY <<< "${{ steps.scraper.outputs.files }}"
          for FILE in "${FILES_ARRAY[@]}"; do
            echo "🚀 Uploading: $FILE"
            if [ -z "$PD_API_KEY" ]; then
              RESPONSE=$(curl -F "file=@$FILE" https://pixeldrain.com/api/file)
            else
              RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@$FILE" https://pixeldrain.com/api/file)
            fi
            ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "✅ Link: https://pixeldrain.com/u/$ID"
          done
