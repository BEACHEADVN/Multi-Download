name: Kemono Ultimate Fix Downloader (v2)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fix DNS Resolution
        run: |
          sudo echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf > /dev/null
          sudo echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf > /dev/null

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          pip install requests

      - name: Fetch and Download
        id: scraper
        shell: python
        run: |
            import os, requests, sys, urllib.parse, time

            service = "patreon"
            user_id = "131186049"
            post_id = "117252586"
            api_url = f"https://kemono.su/api/v1/{service}/user/{user_id}/post/{post_id}"
            
            headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                'Accept': 'application/json',
                'Referer': f'https://kemono.su/{service}/user/{user_id}/post/{post_id}'
            }

            response = None
            try:
                print(f"📡 Đang kết nối tới API: {api_url}")
                for i in range(3):
                    try:
                        # Thêm timeout và allow_redirects
                        response = requests.get(api_url, headers=headers, timeout=30, allow_redirects=True)
                        if response.status_code == 200:
                            break
                        print(f"⚠️ Lần thử {i+1} thất bại (Status: {response.status_code})")
                    except Exception as e:
                        print(f"⚠️ Lần thử {i+1} lỗi kết nối: {e}")
                    time.sleep(10) # Tăng thời gian chờ giữa các lần thử
                
                if response is None or response.status_code != 200:
                    status = response.status_code if response else "No Response"
                    print(f"❌ API không phản hồi hoặc lỗi (Status: {status})")
                    if response: print(f"Nội dung: {response.text[:500]}")
                    sys.exit(1)
                
                data = response.json()
                post_data = data[0] if isinstance(data, list) and len(data) > 0 else data
                
                if not post_data or 'attachments' not in post_data:
                    # Nếu là post không có đính kèm nhưng có file chính
                    attachments = []
                else:
                    attachments = post_data.get('attachments', [])
                
                main_file = post_data.get('file')
                if main_file and main_file.get('path'):
                    attachments.append(main_file)

                if not attachments:
                    print("❌ Không tìm thấy file đính kèm nào!")
                    sys.exit(1)

                downloaded_files = []
                # Thử danh sách server đa dạng hơn
                servers = ["https://n4.kemono.su", "https://n3.kemono.su", "https://n5.kemono.su", "https://kemono.su"]
                
                for file_info in attachments:
                    path = file_info.get('path')
                    name = file_info.get('name') or path.split('/')[-1]
                    # Clean tên file khỏi ký tự đặc biệt
                    name = "".join([c for c in name if c.isalnum() or c in "._- "]).strip()
                    
                    success = False
                    for srv in servers:
                        dl_url = f"{srv}/data{path}?f={urllib.parse.quote(name)}"
                        print(f"⏳ Thử tải {name} từ server: {srv}")
                        try:
                            with requests.get(dl_url, headers=headers, stream=True, timeout=60) as r:
                                if r.status_code == 200:
                                    with open(name, 'wb') as f:
                                        for chunk in r.iter_content(chunk_size=8192):
                                            f.write(chunk)
                                    success = True
                                    print(f"✅ OK: {name}")
                                    break
                                else:
                                    print(f"❌ Server {srv} báo lỗi {r.status_code}")
                        except:
                            continue
                    
                    if success:
                        downloaded_files.append(name)

                if not downloaded_files:
                    print("❌ Không có file nào được tải thành công!")
                    sys.exit(1)

                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"files={','.join(downloaded_files)}\n")

            except Exception as e:
                print(f"❌ Lỗi hệ thống: {e}")
                sys.exit(1)

      - name: Upload to Pixeldrain
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          IFS=',' read -ra FILES_ARRAY <<< "${{ steps.scraper.outputs.files }}"
          for FILE in "${FILES_ARRAY[@]}"; do
            echo "🚀 Uploading: $FILE"
            if [ -z "$PD_API_KEY" ]; then
              RESPONSE=$(curl -F "file=@$FILE" https://pixeldrain.com/api/file)
            else
              RESPONSE=$(curl -u ":$PD_API_KEY" -F "file=@$FILE" https://pixeldrain.com/api/file)
            fi
            ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "✅ Link: https://pixeldrain.com/u/$ID"
          done
