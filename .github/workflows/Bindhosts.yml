name: Check and Upload Bindhosts Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *" # 12:00 PM Việt Nam

permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== PULL STATE =====
      - name: Pull latest
        run: git pull origin main || true

      # ===== GET LATEST RELEASE INFO =====
      - name: Get Latest Release
        id: bindhosts
        run: |
          JSON=$(curl -s https://api.github.com/repos/bindhosts/bindhosts/releases/latest)
          TAG=$(echo "$JSON" | jq -r '.tag_name')
          
          # Tìm đúng Asset có tên là bindhosts.zip
          DL_URL=$(echo "$JSON" | jq -r '.assets[] | select(.name == "bindhosts.zip") | .browser_download_url')
          HTML_URL=$(echo "$JSON" | jq -r '.html_url')

          if [ -z "$DL_URL" ] || [ "$DL_URL" = "null" ]; then
            echo "Không tìm thấy file bindhosts.zip, dùng link fallback..."
            DL_URL="https://github.com/bindhosts/bindhosts/archive/refs/tags/${TAG}.zip"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "dl_url=$DL_URL" >> $GITHUB_OUTPUT
          echo "html_url=$HTML_URL" >> $GITHUB_OUTPUT

      # ===== CHECK STATE =====
      - name: Check State
        id: check
        run: |
          TAG="${{ steps.bindhosts.outputs.tag }}"
          STATE_FILE="bindhosts_state.txt"
          touch $STATE_FILE
          LAST_TAG=$(cat $STATE_FILE)

          if [ "$TAG" = "$LAST_TAG" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== DOWNLOAD & VERIFY =====
      - name: Download Asset
        if: steps.check.outputs.skip != 'true'
        run: |
          # Tải file vào thư mục làm việc gốc
          curl -L -o "final_bindhosts.zip" "${{ steps.bindhosts.outputs.dl_url }}"
          
          if [ ! -f "final_bindhosts.zip" ]; then
            echo "LỖI: Tải file thất bại!"
            exit 1
          fi
          ls -lh final_bindhosts.zip

      # ===== TELEGRAM UPLOAD =====
      - name: Upload to Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TAG="${{ steps.bindhosts.outputs.tag }}"
          URL="${{ steps.bindhosts.outputs.html_url }}"
          
          CAPTION="<b>🚀 Bindhosts New Update!</b>%0A%0AVersion: <code>$TAG</code>%0A%0A<a href=\"$URL\">🔗 Xem chi tiết trên GitHub</a>"

          # Sử dụng biến môi trường $GITHUB_WORKSPACE để xác định đường dẫn tuyệt đối
          # Đảm bảo @ được đặt ngay trước đường dẫn file
          curl -v -F chat_id="${CHAT_ID}" \
               -F document=@"$GITHUB_WORKSPACE/final_bindhosts.zip" \
               -F caption="$CAPTION" \
               -F parse_mode="HTML" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"

      # ===== SAVE & COMMIT =====
      - name: Save new state
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "${{ steps.bindhosts.outputs.tag }}" > bindhosts_state.txt
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add bindhosts_state.txt
          git commit -m "Update bindhosts state to ${{ steps.bindhosts.outputs.tag }}" || exit 0
          git push
