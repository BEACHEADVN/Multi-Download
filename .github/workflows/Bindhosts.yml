name: Check and Upload Bindhosts Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *" # 12:00 PM giờ Việt Nam

permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== PULL STATE =====
      - name: Pull latest
        run: |
          git pull origin main || true

      # ===== GET LATEST RELEASE INFO =====
      - name: Get Latest Release
        id: bindhosts
        run: |
          JSON=$(curl -s https://api.github.com/repos/bindhosts/bindhosts/releases/latest)
          
          TAG=$(echo "$JSON" | jq -r '.tag_name')
          # Lấy link trực tiếp tới file Source Code (.zip) của GitHub
          DL_URL="https://github.com/bindhosts/bindhosts/archive/refs/tags/${TAG}.zip"
          HTML_URL=$(echo "$JSON" | jq -r '.html_url')
          
          if [ "$TAG" = "null" ] || [ -z "$TAG" ]; then
            echo "Lỗi: Không lấy được thông tin TAG từ GitHub API."
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "dl_url=$DL_URL" >> $GITHUB_OUTPUT
          echo "html_url=$HTML_URL" >> $GITHUB_OUTPUT

      # ===== CHECK STATE =====
      - name: Check State
        id: check
        run: |
          TAG="${{ steps.bindhosts.outputs.tag }}"
          STATE_FILE="bindhosts_state.txt"
          touch $STATE_FILE
          LAST_TAG=$(cat $STATE_FILE)

          if [ "$TAG" = "$LAST_TAG" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ===== DOWNLOAD (TẢI TRỰC TIẾP ZIP) =====
      - name: Download Asset
        if: steps.check.outputs.skip != 'true'
        run: |
          # Tải file zip của phiên bản đó
          curl -L -o "bindhosts_${{ steps.bindhosts.outputs.tag }}.zip" "${{ steps.bindhosts.outputs.dl_url }}"
          
          # Kiểm tra sự tồn tại của file
          if [ ! -f "bindhosts_${{ steps.bindhosts.outputs.tag }}.zip" ]; then
            echo "LỖI: Không thể tải được file zip từ GitHub!"
            exit 1
          fi
          
          echo "Danh sách file hiện tại:"
          ls -lh *.zip

      # ===== TELEGRAM UPLOAD =====
      - name: Upload to Telegram
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TAG="${{ steps.bindhosts.outputs.tag }}"
          URL="${{ steps.bindhosts.outputs.html_url }}"
          FILE="bindhosts_${TAG}.zip"
          
          CAPTION="<b>🚀 Bindhosts New Update!</b>%0A%0AVersion: <code>$TAG</code>%0A%0A<a href=\"$URL\">🔗 Xem chi tiết trên GitHub</a>"

          # Sử dụng đường dẫn tuyệt đối biến FILE
          curl -v -F chat_id="${CHAT_ID}" \
               -F document=@"./$FILE" \
               -F caption="$CAPTION" \
               -F parse_mode="HTML" \
               "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"

      # ===== SAVE & COMMIT =====
      - name: Save new state
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "${{ steps.bindhosts.outputs.tag }}" > bindhosts_state.txt
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add bindhosts_state.txt
          git commit -m "Update bindhosts state to ${{ steps.bindhosts.outputs.tag }}" || exit 0
          git push
