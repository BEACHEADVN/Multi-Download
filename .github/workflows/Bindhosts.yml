name: Check and Upload Bindhosts Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *" # 12:00 PM Việt Nam

permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== PULL STATE =====
      - name: Pull latest
        run: git pull origin main || true

      # ===== GET LATEST RELEASE INFO =====
      - name: Get Release Info (Safe Mode)
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
            import os, requests, json
            
            repo = "sidex15/susfs4ksu-module"
            headers = {"Authorization": f"token {os.environ['GH_TOKEN']}"}
            
            try:
                # Lấy dữ liệu Release từ GitHub
                response = requests.get(f"https://api.github.com/repos/{repo}/releases/latest", headers=headers)
                data = response.json()
                
                tag = data.get('tag_name', '')
                date = data.get('published_at', data.get('created_at', ''))
                
                # Tìm asset zip
                assets = data.get('assets', [])
                zip_asset = next((a for a in assets if a['name'].endswith('.zip')), None)
                
                if zip_asset:
                    file_name = zip_asset['name']
                    dl_url = zip_asset['browser_download_url']
                    size = zip_asset['size']
                else:
                    file_name = f"susfs4ksu-{tag}.zip"
                    dl_url = f"https://github.com/{repo}/archive/refs/tags/{tag}.zip"
                    size = 0
                
                # Ghi dữ liệu ra GITHUB_OUTPUT an toàn
                with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                    f.write(f"tag={tag}\n")
                    f.write(f"file_name={file_name}\n")
                    f.write(f"dl_url={dl_url}\n")
                    f.write(f"size={size}\n")
                    f.write(f"date={date}\n")
                    
            except Exception as e:
                print(f"CRITICAL ERROR: {e}")
                exit(1)

      # ===== CHECK STATE =====
      - name: Check State
        id: check
        run: |
          TAG="${{ steps.bindhosts.outputs.tag }}"
          STATE_FILE="bindhosts_state.txt"
          touch $STATE_FILE
          LAST_TAG=$(cat $STATE_FILE)
          if [ "$TAG" = "$LAST_TAG" ]; then echo "skip=true" >> $GITHUB_OUTPUT; else echo "skip=false" >> $GITHUB_OUTPUT; fi

      # ===== DOWNLOAD =====
      - name: Download Asset
        if: steps.check.outputs.skip != 'true'
        run: |
          curl -L -o "bindhosts_temp.zip" "${{ steps.bindhosts.outputs.dl_url }}"
          ls -lh bindhosts_temp.zip

      - name: Send Notification to Telegram
        if: success()
        uses: xireiki/channel-post@v1
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_USER_ID }}
          context: |
            <a href="https://github.com/bindhosts/bindhosts">https://github.com/bindhosts/bindhosts</a>
          parse_mode: HTML
          method: sendMessage

      # ===== TELEGRAM UPLOAD (PYTHON) =====
      - name: Upload to Telegram via Python
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ steps.bindhosts.outputs.tag }}
          URL: ${{ steps.bindhosts.outputs.html_url }}
        shell: python
        run: |
          import os
          import requests

          bot_token = os.environ['BOT_TOKEN']
          chat_id = os.environ['CHAT_ID']
          tag = os.environ['TAG']
          url = os.environ['URL']
          
          # File gốc vừa tải về
          old_name = "bindhosts_temp.zip"
          # Tên file mới theo phiên bản (ví dụ: bindhosts-v2.1.2.zip)
          new_name = f"bindhosts-{tag}.zip"
          
          # Đổi tên file vật lý trên ổ đĩa
          os.rename(old_name, new_name)
          
          caption = f"<b>🚀 Bindhosts New Update!</b>\n\nVersion: <code>{tag}</code>\n\n<a href='{url}'>🔗 Xem chi tiết trên GitHub</a>"
          
          print(f"Đang gửi file: {new_name}...")
          
          with open(new_name, 'rb') as f:
              files = {'document': (new_name, f)} # Gửi kèm tên file mới
              data = {
                  'chat_id': chat_id,
                  'caption': caption,
                  'parse_mode': 'HTML'
              }
              response = requests.post(f"https://api.telegram.org/bot{bot_token}/sendDocument", data=data, files=files)
              
          if response.status_code == 200:
              print(f"Gửi thành công file {new_name}!")
          else:
              print(f"Lỗi: {response.text}")
              exit(1)

      # ===== SAVE & COMMIT =====
      - name: Save new state
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "${{ steps.bindhosts.outputs.tag }}" > bindhosts_state.txt
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add bindhosts_state.txt
          git commit -m "Update bindhosts state to ${{ steps.bindhosts.outputs.tag }}" || exit 0
          git push
