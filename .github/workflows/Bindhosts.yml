name: Check and Upload Bindhosts Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *" # 12:00 PM Việt Nam

permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== PULL STATE =====
      - name: Pull latest
        run: git pull origin main || true

      # ===== GET LATEST RELEASE INFO =====
      - name: Get Latest Release
        id: bindhosts
        run: |
          JSON=$(curl -s https://api.github.com/repos/bindhosts/bindhosts/releases/latest)
          TAG=$(echo "$JSON" | jq -r '.tag_name')
          DL_URL=$(echo "$JSON" | jq -r '.assets[] | select(.name == "bindhosts.zip") | .browser_download_url')
          HTML_URL=$(echo "$JSON" | jq -r '.html_url')

          if [ -z "$DL_URL" ] || [ "$DL_URL" = "null" ]; then
            DL_URL="https://github.com/bindhosts/bindhosts/archive/refs/tags/${TAG}.zip"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "dl_url=$DL_URL" >> $GITHUB_OUTPUT
          echo "html_url=$HTML_URL" >> $GITHUB_OUTPUT

      # ===== CHECK STATE =====
      - name: Check State
        id: check
        run: |
          TAG="${{ steps.bindhosts.outputs.tag }}"
          STATE_FILE="bindhosts_state.txt"
          touch $STATE_FILE
          LAST_TAG=$(cat $STATE_FILE)
          if [ "$TAG" = "$LAST_TAG" ]; then echo "skip=true" >> $GITHUB_OUTPUT; else echo "skip=false" >> $GITHUB_OUTPUT; fi

      # ===== DOWNLOAD =====
      - name: Download Asset
        if: steps.check.outputs.skip != 'true'
        run: |
          curl -L -o "bindhosts.zip" "${{ steps.bindhosts.outputs.dl_url }}"
          ls -lh bindhosts.zip

      # ===== TELEGRAM UPLOAD (SỬ DỤNG PYTHON) =====
      - name: Upload to Telegram via Python
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ steps.bindhosts.outputs.tag }}
          URL: ${{ steps.bindhosts.outputs.html_url }}
        shell: python
        run: |
          import os
          import requests

          bot_token = os.environ['BOT_TOKEN']
          chat_id = os.environ['CHAT_ID']
          tag = os.environ['TAG']
          url = os.environ['URL']
          file_path = "bindhosts.zip"

          caption = f"<b>🚀 Bindhosts New Update!</b>\n\nVersion: <code>{tag}</code>\n\n<a href='{url}'>🔗 Xem chi tiết trên GitHub</a>"
          
          print(f"Đang gửi file: {file_path}...")
          
          with open(file_path, 'rb') as f:
              files = {'document': f}
              data = {
                  'chat_id': chat_id,
                  'caption': caption,
                  'parse_mode': 'HTML'
              }
              response = requests.post(f"https://api.telegram.org/bot{bot_token}/sendDocument", data=data, files=files)
              
          if response.status_code == 200:
              print("Gửi Telegram thành công!")
          else:
              print(f"Lỗi gửi Telegram: {response.text}")
              exit(1)

      # ===== SAVE & COMMIT =====
      - name: Save new state
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "${{ steps.bindhosts.outputs.tag }}" > bindhosts_state.txt
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add bindhosts_state.txt
          git commit -m "Update bindhosts state to ${{ steps.bindhosts.outputs.tag }}" || exit 0
          git push
