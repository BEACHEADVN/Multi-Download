name: Check and Upload Integrity-Box Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *" # 12:00 PM Việt Nam

permissions:
  contents: write

jobs:
  check-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== PULL STATE =====
      - name: Pull latest
        run: git pull origin main || true

      # ===== GET LATEST RELEASE INFO =====
      - name: Get Latest Release
        id: integrity
        run: |
          JSON=$(curl -s https://api.github.com/repos/MeowDump/Integrity-Box/releases/latest)
          TAG=$(echo "$JSON" | jq -r '.tag_name')
          
          # Lấy tên file gốc của asset đầu tiên có đuôi .zip
          FILE_NAME=$(echo "$JSON" | jq -r '.assets[] | select(.name | endswith(".zip")) | .name' | head -n 1)
          # Lấy link tải tương ứng
          DL_URL=$(echo "$JSON" | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -n 1)
          HTML_URL=$(echo "$JSON" | jq -r '.html_url')

          # Nếu không tìm thấy asset nào (chỉ có source code)
          if [ -z "$FILE_NAME" ] || [ "$FILE_NAME" = "null" ]; then
            FILE_NAME="Integrity-Box-${TAG}.zip"
            DL_URL="https://github.com/MeowDump/Integrity-Box/archive/refs/tags/${TAG}.zip"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "dl_url=$DL_URL" >> $GITHUB_OUTPUT
          echo "html_url=$HTML_URL" >> $GITHUB_OUTPUT

      # ===== CHECK STATE =====
      - name: Check State
        id: check
        run: |
          TAG="${{ steps.integrity.outputs.tag }}"
          STATE_FILE="integrity_state.txt"
          touch $STATE_FILE
          LAST_TAG=$(cat $STATE_FILE)
          if [ "$TAG" = "$LAST_TAG" ]; then echo "skip=true" >> $GITHUB_OUTPUT; else echo "skip=false" >> $GITHUB_OUTPUT; fi

      # ===== DOWNLOAD =====
      - name: Download Asset
        if: steps.check.outputs.skip != 'true'
        run: |
          # Tải về với tên file gốc lấy từ GitHub
          curl -L -o "${{ steps.integrity.outputs.file_name }}" "${{ steps.integrity.outputs.dl_url }}"
          ls -lh "${{ steps.integrity.outputs.file_name }}"

      - name: Send Notification to Telegram
        if: success()
        uses: xireiki/channel-post@v1
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_USER_ID }}
          context: |
            <a href="https://github.com/MeowDump/Integrity-Box">https://github.com/MeowDump/Integrity-Box</a>
          parse_mode: HTML
          method: sendMessage

      # ===== TELEGRAM UPLOAD (PYTHON) =====
      - name: Upload to Telegram via Python
        if: steps.check.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAG: ${{ steps.integrity.outputs.tag }}
          URL: ${{ steps.integrity.outputs.html_url }}
          FILE_NAME: ${{ steps.integrity.outputs.file_name }}
        shell: python
        run: |
          import os
          import requests

          bot_token = os.environ['BOT_TOKEN']
          chat_id = os.environ['CHAT_ID']
          tag = os.environ['TAG']
          url = os.environ['URL']
          file_name = os.environ['FILE_NAME']
          
          caption = f"<b>📦 Integrity-Box New Update!</b>\n\nVersion: <code>{tag}</code>\n\n<a href='{url}'>🔗 Xem chi tiết trên GitHub</a>"
          
          print(f"Đang gửi file: {file_name}...")
          
          if not os.path.exists(file_name):
              print(f"Lỗi: Không tìm thấy file {file_name}")
              exit(1)

          with open(file_name, 'rb') as f:
              files = {'document': (file_name, f)}
              data = {
                  'chat_id': chat_id,
                  'caption': caption,
                  'parse_mode': 'HTML'
              }
              response = requests.post(f"https://api.telegram.org/bot{bot_token}/sendDocument", data=data, files=files)
              
          if response.status_code == 200:
              print(f"Gửi thành công file {file_name}!")
          else:
              print(f"Lỗi: {response.text}")
              exit(1)

      # ===== SAVE & COMMIT =====
      - name: Save new state
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "${{ steps.integrity.outputs.tag }}" > integrity_state.txt
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add integrity_state.txt
          git commit -m "Update Integrity-Box state to ${{ steps.integrity.outputs.tag }}" || exit 0
          git push
